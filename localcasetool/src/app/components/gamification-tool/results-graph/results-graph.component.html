<div
  class="wrapper"
  style="
    height: 95vh;
    background-color: rgba(215, 223, 219);
    margin-bottom: 5vh;
    overflow-x: hidden;
  "
>
  <div class="header-buttons">
    <button
      mat-raised-button
      [routerLink]="['/help']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="header-button-help"
    >
      <!-- Help -->
      Help
    </button>

    <button
      mat-raised-button
      [routerLink]="['/home']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="header-button-home"
    >
      <!-- Tool selection -->
      Home
    </button>

    <button
      mat-raised-button
      [routerLink]="['/gamificationMissionSelect']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="header-button"
      (click)="resetToCCgame()"
    >
      <!-- Tool selection -->
      CC game
    </button>
  </div>

  <div
    class="intern-wrapper"
    style="
      display: flex;
      position: relative;
      flex-direction: column;
      height: 100%; /* Make sure it takes up the full height of its parent */
      width: 90%;
      margin-left: 5%;
      margin-top: 1%;
      background-color: white;
      margin-bottom: 5rem;
    "
  >
    <div style="background-color: white; height: 100%; margin-bottom: 5rem">
      <div
        class="header"
        style="
          width: 100%;
          margin-bottom: 1%;
          margin-left: 5%;
          color: #465c95;
          font-size: 3vh;
          padding-top: 2%;
          height: 4%;
        "
      >
        Climate Change Game
      </div>
      <hr
        style="
          height: 1px;
          display: flex;
          width: 90%;
          margin-left: 5%;
          background-color: #8d8d90;
        "
      />

      <div
        class="key-definitions-container"
        style="
          width: 98%;
          margin-right: 1%;
          margin-left: 1%;
          margin-bottom: 1%;
          background-color: #eefbf4;
          height: 85%;
          position: absolute;
          bottom: 0%;
          border-radius: 3vh;
          display: flex;
          flex-direction: column;
        "
      >
        <!-- <div style="width: 35%;margin-left: 1%;margin-right: 1%;height: 100%;">

        <strong style="font-size: 5vh;">Summary of the mission</strong>
      </div>

        <!-- <div class="summary_results">
          <div style="font-size: 3vh;">Summary Results</div>
          <div><img src="assets/images/summary-results-images.png" alt=""></div>
        </div> -->
        <div
          class="upper-container"
          style="height: 80%; width: 100%; display: flex"
        >
          <div class="left-part-container" style="height: 100%; width: 40%">
            <div
              style="
                height: 10%;
                display: flex;
                margin-left: 5%;
                align-items: center;
                font-size: 4vh;
              "
            >
              Summary of the mission
            </div>
            <div
              class="hazards"
              style="
                height: 10%;
                display: flex;
                margin-left: 5%;
                margin-bottom: 2%;
                align-items: center;
              "
            >
              <div style="font-size: 3vh">Hazard</div>
              <div
                style="
                  display: flex;
                  flex-direction: row;
                  height: -webkit-fill-available;
                "
              >
                <img
                  src="assets/images/kpi-hazard-green.png"
                  alt=""
                  style="margin-left: 1%; margin-right: 1%"
                />
                <img
                  src="assets/images/kpi-hazard-red.png"
                  alt=""
                  style="margin-left: 1%; margin-right: 1%"
                />
                <img
                  src="assets/images/kpi-hazard-orange.png"
                  alt=""
                  style="margin-left: 1%; margin-right: 1%"
                />
              </div>
            </div>
            <div
              class="kpi-select"
              style="
                height: 16%;
                display: flex;
                margin-bottom: 5%;
                margin-left: 5%;
                flex-direction: column;
                justify-content: center;
              "
            >
              <div style="font-size: 3vh">
                Select a KPI to display de summary:
              </div>
              <div class="hazard-coins-container">
                <img
                  *ngFor="let coin of coinsList; let i = index"
                  [src]="coin"
                  alt=""
                  [class.selected]="selectedIndex === i"
                  (click)="selectImage(i)"
                  style="
                    width: 6%;
                    margin-left: 1%;
                    margin-right: 1%;
                    opacity: 0.5;
                  "
                />
              </div>
            </div>
            <div
              class="chart-wrapper"
              style="height: 55%; margin-bottom: 1%; margin-left: 1%; display: flex;justify-content: center;"
            >
              <canvas #kpiChart style="height: 100%; width: 98%"></canvas>
            </div>
          </div>
          <div
            class="right-part-container"
            style="
              width: 60%;
              height: 100%;
              display: flex;
              flex-direction: column;
              justify-content: center;
            "
          >
            <div
              style="
                height: 30%;
                display: flex;
                align-items: flex-end;
                justify-content: center;
                font-size: 3vh;
              "
            >
              Summary results
            </div>
            <div
              style="
                height: 69%;
                margin-left: 1%;
                margin-right: 1%;
                margin-bottom: 1%;
              "
            >
              <canvas #summaryChart style="height: 100%; width: 100%"></canvas>
            </div>
          </div>
        </div>
        <div class="lower-container" style="height: 30%; width: 100%">
          <div
            style="
              bottom: 4%;
              /* left: 40%; */
              display: flex;
              flex-direction: row;
              justify-content: center;
              position: absolute;
              width: -webkit-fill-available;
            "
          >
            <button class="confirm-button" style="margin-left: 5%" [routerLink]="['/gamificationMissionSelect']"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }" (click)="resetToCCgame()">
              Start new mission
            </button>

            <button
              class="confirm-button"
              style="margin-left: 5%"
              [routerLink]="['/home']"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              Finish
            </button>
          </div>
          <div
            style="
              color: #465c95;
              font-size: 3vh;
              cursor: pointer;
              position: absolute;
              bottom: 4%;
              left: 2%;
            "
            [routerLink]="['/gamificationClimateChangeGame']"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            &lt;Go back
          </div>
        </div>
      </div>
    </div>
  </div>
  <section class="the_footer">
    <app-footer class="fixed bottom-0" style="bottom: 0"></app-footer>
  </section>
</div>
