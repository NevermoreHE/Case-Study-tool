<div class="wrapper">
  <div class="header-buttons">
    <button
      mat-raised-button
      [routerLink]="['/help']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="header-button-help"
    >
      <!-- Help -->
      {{ "HEADER.HELP" | translate }}
    </button>

    <button
      mat-raised-button
      [routerLink]="['/home']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="header-button-home"
    >
      <!-- Tool selection -->
      Home
    </button>

    <button
      mat-raised-button
      [routerLink]="['/caseStudy']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="header-button"
    >
      <!-- Tool selection -->
      Case Study Tool
    </button>
  </div>

  

  

  

  <div
    class="intern-wrapper"
    
  >
    <div style="background-color: white; margin-bottom: 5%; width: 90%">
      <div
        class="header"
        style="
          width: 90%;
          margin-bottom: 1%;
          margin-left: 5%;
          color: #465c95;
          font-size: 3vh;
          padding-top: 2%;
          display: flex;
          justify-content: space-between;
        "
      >
        <div>{{ title_case }}</div>
        <div>Storylines</div>
      </div>

      <hr
        style="
          height: 1px;
          display: flex;
          width: 90%;
          margin-left: 5%;
          background-color: #8d8d90;
        "
      />
      <div
        class="sectors-challanges"
        style="display: flex; align-items: center"
      >
        <div class="sector-text">
          <div>
            <p
              style="
                font-weight: bold;
                font-family: 'Inter', sans-serif !important;
                margin-top: 3%;
                font-size: 2vh;
                text-align: center;
                color: #465c95;
              "
            >
              <span>{{ policyPreviouslySelected }}</span>
            </p>
          </div>

          <div class="resultsOfTheScenarioSelected">
            Results of the applied scenario:
          </div>

          <div style="text-align: right; transform: translateY(-105%)">
            <img
              src="assets/images/floppy-disc.png"
              style="
                height: 3vh;
                margin-left: 1vh;
                margin-right: 1vh;
                background-color: #8d8d90;
                padding: 2vh;
                border-radius: 1vh;
              "
              alt=""
            />
            <img
              src="assets/images/download-image.png"
              style="
                height: 3vh;
                margin-left: 1vh;
                margin-right: 1vh;
                background-color: #8d8d90;
                padding: 2vh;
                border-radius: 1vh;
              "
              alt=""
            />
          </div>
          <div style="text-align: left">
            <div class="indicator">
              <p>Indicator</p>
              <select (change)="onIndicatorChange($event)" style="margin-left:2%; margin-bottom: 2%">
  <option value="" selected disabled>Select an indicator...</option>

  <option *ngFor="let opt of indicatorOptions" [value]="opt.code">
    {{ opt.label }}
  </option>
</select>
             <div class="chart-rect">
  <div class="chart-placeholder" *ngIf="!selectedIndicator">
    Select an indicator to display the chart
  </div>

  <!-- keep canvas always in DOM to avoid ViewChild timing issues -->
  <canvas #resultsChart [style.display]="selectedIndicator ? 'block' : 'none'"></canvas>
</div>
            </div>

            <div
              class="compare_with_baselines"
              style="
                display: flex;
                flex-direction: column;
                width: fit-content;
                align-items: center;
              "
            >
              Compare with baselines:
              <label class="switch">
  <input type="checkbox" (change)="onBaselineToggle($event)" />
  <span class="slider"></span>
</label>
            </div>
          </div>
        </div>
      </div>
      <section style="width: 100%; display: flex; justify-content: center">
        <button
          mat-raised-button
          [routerLink]="['/caseStudy']"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="the_next_button"
          [disabled]="false"
          style="margin-top: 4vh; color: #465c95"
        >
          Select new Case Study
        </button>
      </section>
    </div>
  </div>
