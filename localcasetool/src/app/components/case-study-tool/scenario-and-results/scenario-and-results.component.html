<div class="wrapper">
  <div class="header-buttons">
    <button
      mat-raised-button
      [routerLink]="['/help']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="header-button-help"
    >
      <!-- Help -->
      {{ "HEADER.HELP" | translate }}
    </button>

    <button
      mat-raised-button
      [routerLink]="['/home']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="header-button-home"
    >
      <!-- Tool selection -->
      Home
    </button>

    <button
      mat-raised-button
      [routerLink]="['/caseStudy']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="header-button"
    >
      <!-- Tool selection -->
      Case Study Tool
    </button>
  </div>

  <div
    class="intern-wrapper"
    
  >
    <div style="background-color: white; margin-bottom: 5%; width: 90%">
      <div
        class="header"
        style="
          width: 90%;
          margin-bottom: 1%;
          margin-left: 5%;
          color: #465c95;
          font-size: 3vh;
          padding-top: 2%;
          display: flex;
          justify-content: space-between;
        "
      >
        <div>{{ title_case }}</div>
        <div>Storylines</div>
      </div>

      <hr
        style="
          height: 1px;
          display: flex;
          width: 90%;
          margin-left: 5%;
          background-color: #8d8d90;
        "
      />
      <div
        class="sectors-challanges"
        style="display: flex; align-items: center"
      >
        <div class="sector-text">
          <div>
            <p
              style="
                font-weight: bold;
                font-family: 'Inter', sans-serif !important;
                margin-top: 3%;
                font-size: 2vh;
                text-align: center;
                color: #465c95;
              "
            >
              <strong>{{ thePolicySelectedPreviously }}</strong>
            </p>
          </div>

          <div style="width: 100%; display: flex; justify-content: center">
            <div class="toggle-container">
              <div
                class="toggle-option"
                [class.active]="selected === 'SSP245'"
                (click)="select('SSP245')"
              >
                SSP245
              </div>
              <div
                class="toggle-option"
                [class.active]="selected === 'SSP585'"
                (click)="select('SSP585')"
              >
                SSP585
              </div>
            </div>
          </div>
          
          <div style="text-align: center">
            <p style="line-height: 1.5vw; padding: 1vh 0vh; text-align: left">
              {{appliedPoliciesDescriptionsReceived?.[theScenarioIndex-1]?.storyline_description}}
            </p>

            <div style="text-align: left">
              <strong>Applied Policies:</strong>
              <ul *ngFor="let policy of appliedPoliciesReceived;let i = index">
                <li>{{policy.apl_policy}}</li>
              </ul>
            </div>
          </div>

          <div>
            <p style="margin-top: 5%; margin-bottom: 4%">
              Explore results under the following alternatives:
            </p>
            <div
              class="inputs"
              style="display: flex; justify-content: space-evenly"
            >
              <div class="input_policy_button">
                <input
                  type="radio"
                  value="policy"
                  name="value"
                  (click)="checkInputValue('Low policy application')"
                />
                <label for="policy">Low policy application </label>
              </div>
              <div class="input_policy_button">
                <input
                  type="radio"
                  value="policy"
                  name="value"
                  (click)="checkInputValue('Medium policy application')"
                />
                <label for="policy">Medium policy application</label>
              </div>
              <div class="input_policy_button">
                <input
                  type="radio"
                  value="policy"
                  name="value"
                  (click)="checkInputValue('High policy application')"
                />
                <label for="policy">High policy application</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button
        mat-raised-button
        [routerLink]="['/scenariosAppliedResults']"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="the_next_button"
        [disabled]="execute_button"
        style="margin-top: 4vh"
      >
        Execute
      </button>
    </div>
  </div>
